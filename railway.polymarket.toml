# Railway service definition for the Polymarket sync cron.
#
# Pulls top markets + whale holders from Polymarket's public APIs and
# upserts them into Supabase (polymarket_markets / polymarket_whales /
# polymarket_market_holders) for the Sonar "Polymarket terminal" frontend.
#
# Provisioning checklist (one-time, Railway dashboard):
#   1. Apply migrations/polymarket_tables.sql in Supabase first.
#   2. Create a new service in the project, point it at this repo.
#   3. Settings -> Source -> Config Path = railway.polymarket.toml.
#   4. Ensure SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY env vars are set.
#   5. Deploy. Trigger one manual run for an immediate populate.
#
# No Polymarket API key is required (public endpoints).
#
# Markets are pulled from the /events endpoint, which carries REAL category
# tags (Sports, Politics, Crypto, ...) and paginates for breadth.
#
# Depth knobs (tune in the startCommand below):
#   --event-pages N      pages of events to pull (breadth)
#   --events-per-page N  events per page
#   --max-markets N      cap on stored market rows
#   --holders-markets N  fetch holders only for the top N *contested* markets
#                        (skips >97% near-resolved longshots so whale data
#                         lands where the action is)
#   --holders N          top holders (whales) per market
#   --enrich-whales N    portfolio value + positions for the top N whales
#
# The run below stores up to ~400 markets across categories and makes a few
# hundred public calls (a few minutes). Raise the schedule interval if you
# push these much higher.

[build]
builder = "RAILPACK"

[deploy]
startCommand = "python scripts/sync_polymarket.py --live --event-pages 6 --events-per-page 50 --max-markets 400 --holders-markets 100 --holders 30 --enrich-whales 60"
cronSchedule = "*/15 * * * *"
restartPolicyType = "NEVER"
